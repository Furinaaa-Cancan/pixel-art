<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* 开始菜单 */
  #menu {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    z-index: 10;
  }
  #menu h1 {
    font-size: 48px;
    color: #e94560;
    text-shadow: 0 0 20px rgba(233,69,96,0.5);
  }
  #menu .difficulty {
    display: flex;
    gap: 12px;
  }
  #menu button {
    padding: 12px 28px;
    font-size: 18px;
    border: 2px solid #e94560;
    background: transparent;
    color: #eee;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #menu button:hover, #menu button.active {
    background: #e94560;
    color: #fff;
    transform: scale(1.05);
  }
  #menu .start-btn {
    padding: 14px 48px;
    font-size: 22px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  #menu .start-btn:hover { transform: scale(1.08); }
  #menu .best {
    font-size: 16px;
    color: #888;
  }

  /* 游戏 HUD */
  #hud {
    display: none;
    width: 400px;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 18px;
  }
  #hud .best-score { color: #f0a500; }

  canvas {
    display: none;
    border: 2px solid #e94560;
    border-radius: 4px;
    background: #16213e;
  }
  #msg {
    margin-top: 14px;
    font-size: 18px;
    color: #e94560;
    height: 24px;
  }
  #controls {
    margin-top: 10px;
    font-size: 13px;
    color: #666;
  }

  /* 手机虚拟方向键 */
  #touch-pad {
    display: none;
    margin-top: 20px;
    width: 180px;
    height: 180px;
    position: relative;
  }
  #touch-pad button {
    position: absolute;
    width: 56px;
    height: 56px;
    border: 2px solid rgba(233,69,96,0.5);
    background: rgba(233,69,96,0.15);
    color: #eee;
    font-size: 24px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #touch-pad button:active { background: rgba(233,69,96,0.5); }
  .tp-up    { top: 0; left: 50%; transform: translateX(-50%); }
  .tp-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
  .tp-left  { top: 50%; left: 0; transform: translateY(-50%); }
  .tp-right { top: 50%; right: 0; transform: translateY(-50%); }

  /* 粒子层 */
  #particles {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<!-- 粒子画布 -->
<canvas id="particles"></canvas>

<!-- 开始菜单 -->
<div id="menu">
  <h1>贪吃蛇</h1>
  <div class="best" id="menu-best"></div>
  <div style="color:#aaa; font-size:15px;">选择难度</div>
  <div class="difficulty">
    <button data-diff="easy">简单</button>
    <button data-diff="normal" class="active">普通</button>
    <button data-diff="hard">困难</button>
  </div>
  <button class="start-btn" id="start-btn">开始游戏</button>
</div>

<!-- 游戏界面 -->
<div id="hud">
  <span id="score">得分: 0</span>
  <span class="best-score" id="best-display"></span>
</div>
<canvas id="game" width="400" height="400"></canvas>
<div id="msg"></div>
<div id="controls">方向键 / WASD 控制 · 空格 暂停 · R 重新开始</div>

<!-- 触屏方向键 -->
<div id="touch-pad">
  <button class="tp-up" data-dir="up">&uarr;</button>
  <button class="tp-down" data-dir="down">&darr;</button>
  <button class="tp-left" data-dir="left">&larr;</button>
  <button class="tp-right" data-dir="right">&rarr;</button>
</div>

<script>
// ===== 音效系统（Web Audio API） =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playEat() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(587, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}

function playDie() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(300, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}

// ===== 粒子系统 =====
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeParticles);
resizeParticles();

function spawnParticles(screenX, screenY, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: screenX, y: screenY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 4,
      color
    });
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    pCtx.globalAlpha = p.life;
    pCtx.fillStyle = p.color;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fill();
  });
  pCtx.globalAlpha = 1;
  requestAnimationFrame(updateParticles);
}
updateParticles();

// ===== 检测触屏设备 =====
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

// ===== 游戏核心 =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');
const hudEl = document.getElementById('hud');
const bestEl = document.getElementById('best-display');
const menuEl = document.getElementById('menu');
const menuBestEl = document.getElementById('menu-best');
const touchPad = document.getElementById('touch-pad');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

const DIFFICULTY = {
  easy:   { speed: 160, accel: 1, minSpeed: 90,  label: '简单' },
  normal: { speed: 120, accel: 2, minSpeed: 60,  label: '普通' },
  hard:   { speed: 80,  accel: 3, minSpeed: 40,  label: '困难' },
};

let selectedDiff = 'normal';
let snake, dir, nextDir, food, score, running, gameOver, paused, speed, timer;
let foodPulse = 0;

// 最高分
function getBest() {
  return parseInt(localStorage.getItem('snake_best') || '0', 10);
}
function saveBest(s) {
  if (s > getBest()) localStorage.setItem('snake_best', s);
}
function showBest() {
  const b = getBest();
  bestEl.textContent = b > 0 ? `最高: ${b}` : '';
  menuBestEl.textContent = b > 0 ? `历史最高分: ${b}` : '';
}

// 菜单
document.querySelectorAll('[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDiff = btn.dataset.diff;
  });
});

document.getElementById('start-btn').addEventListener('click', startGame);

function startGame() {
  ensureAudio();
  menuEl.style.display = 'none';
  canvas.style.display = 'block';
  hudEl.style.display = 'flex';
  if (isTouchDevice) touchPad.style.display = 'block';
  init();
}

function returnToMenu() {
  clearInterval(timer);
  canvas.style.display = 'none';
  hudEl.style.display = 'none';
  touchPad.style.display = 'none';
  msgEl.textContent = '';
  menuEl.style.display = 'flex';
  showBest();
}

function init() {
  const diff = DIFFICULTY[selectedDiff];
  snake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  dir = { x: 0, y: 0 };
  nextDir = { x: 0, y: 0 };
  score = 0;
  running = false;
  gameOver = false;
  paused = false;
  speed = diff.speed;
  scoreEl.textContent = '得分: 0';
  showBest();
  msgEl.textContent = '按方向键开始';
  placeFood();
  draw();
  clearInterval(timer);
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
  foodPulse = 0;
}

// 获取 canvas 在屏幕上的坐标
function canvasToScreen(gx, gy) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: rect.left + gx * GRID + GRID / 2,
    y: rect.top + gy * GRID + GRID / 2
  };
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      ctx.strokeRect(i * GRID, j * GRID, GRID, GRID);
    }
  }

  // 食物（脉冲闪烁）
  foodPulse += 0.08;
  const pulse = Math.sin(foodPulse) * 2;
  const fr = GRID / 2 - 2 + pulse;
  ctx.fillStyle = '#e94560';
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 8 + pulse * 2;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, Math.max(fr, 3), 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 蛇身（圆角渐变）
  snake.forEach((seg, i) => {
    const t = 1 - i / (snake.length || 1);
    const hue = 145 + (1 - t) * 30;
    const light = 30 + t * 30;
    ctx.fillStyle = `hsl(${hue}, 80%, ${light}%)`;

    const r = 4;
    const x = seg.x * GRID + 1;
    const y = seg.y * GRID + 1;
    const w = GRID - 2;
    const h = GRID - 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();

    if (i === 0) {
      // 蛇头发光
      ctx.shadowColor = '#0f0';
      ctx.shadowBlur = 10;
      ctx.fillStyle = 'rgba(0,255,0,0.6)';
      ctx.beginPath();
      ctx.arc(seg.x * GRID + GRID / 2, seg.y * GRID + GRID / 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // 蛇眼
      const ex = dir.x || 0, ey = dir.y || 0;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(seg.x * GRID + GRID / 2 + ex * 4 - 3, seg.y * GRID + GRID / 2 + ey * 4 - 3, 2, 0, Math.PI * 2);
      ctx.arc(seg.x * GRID + GRID / 2 + ex * 4 + 3, seg.y * GRID + GRID / 2 + ey * 4 + 3, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // 暂停覆盖
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f0a500';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
  }

  // 游戏结束覆盖
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 40px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 20);
    ctx.font = '20px sans-serif';
    ctx.fillStyle = '#eee';
    ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 15);
    if (score === getBest() && score > 0) {
      ctx.fillStyle = '#f0a500';
      ctx.fillText('新纪录！', canvas.width / 2, canvas.height / 2 + 45);
    }
  }
}

// 食物动画帧
let animFrame;
function animLoop() {
  if (!gameOver && !paused) draw();
  animFrame = requestAnimationFrame(animLoop);
}

function update() {
  if (paused) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 碰撞检测
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver = true;
    running = false;
    clearInterval(timer);
    saveBest(score);
    showBest();
    playDie();
    // 死亡粒子
    const sp = canvasToScreen(snake[0].x, snake[0].y);
    spawnParticles(sp.x, sp.y, '#e94560', 30);
    msgEl.textContent = '按 R 重新开始 · ESC 返回菜单';
    draw();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = `得分: ${score}`;
    playEat();
    // 吃到食物粒子
    const sp = canvasToScreen(food.x, food.y);
    spawnParticles(sp.x, sp.y, '#0f0', 15);
    placeFood();
    // 加速
    const diff = DIFFICULTY[selectedDiff];
    if (speed > diff.minSpeed) {
      speed -= diff.accel;
      clearInterval(timer);
      timer = setInterval(update, speed);
    }
  } else {
    snake.pop();
  }

  draw();
}

// ===== 输入处理 =====
function handleDirection(nd) {
  if (!nd) return;
  if (gameOver) return;
  // 不允许反向
  if (nd.x === -dir.x && nd.y === -dir.y && snake.length > 1) return;
  nextDir = nd;

  if (!running) {
    running = true;
    msgEl.textContent = '';
    timer = setInterval(update, speed);
    animLoop();
  }
}

const dirMap = {
  arrowup: { x: 0, y: -1 }, w: { x: 0, y: -1 }, up: { x: 0, y: -1 },
  arrowdown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, down: { x: 0, y: 1 },
  arrowleft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, left: { x: -1, y: 0 },
  arrowright: { x: 1, y: 0 }, d: { x: 1, y: 0 }, right: { x: 1, y: 0 },
};

// 键盘
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === 'escape') { returnToMenu(); return; }
  if (key === 'r') { init(); return; }
  if (key === ' ' && running && !gameOver) {
    e.preventDefault();
    paused = !paused;
    msgEl.textContent = paused ? '已暂停 - 按空格继续' : '';
    draw();
    return;
  }

  handleDirection(dirMap[key]);
});

// 触屏方向按钮
document.querySelectorAll('#touch-pad button').forEach(btn => {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    handleDirection(dirMap[btn.dataset.dir]);
  });
});

// 触屏滑动
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;

  // 点击暂停/继续
  if (running && !gameOver) {
    // 双指暂停
  }
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStartX) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;

  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    // 轻触 = 暂停
    if (running && !gameOver) {
      paused = !paused;
      msgEl.textContent = paused ? '已暂停 - 点击继续' : '';
      draw();
    }
    return;
  }

  if (Math.abs(dx) > Math.abs(dy)) {
    handleDirection(dx > 0 ? dirMap.right : dirMap.left);
  } else {
    handleDirection(dy > 0 ? dirMap.down : dirMap.up);
  }
});

// 初始化菜单
showBest();
</script>
</body>
</html>
