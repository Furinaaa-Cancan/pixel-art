<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇 Ultimate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#eee;overflow:hidden;touch-action:none;user-select:none}

/* ===== 菜单 ===== */
#menu{position:absolute;display:flex;flex-direction:column;align-items:center;gap:16px;z-index:20;max-width:420px;width:90%}
#menu h1{font-size:52px;letter-spacing:4px;text-shadow:0 0 30px var(--accent),0 0 60px var(--accent);animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{from{text-shadow:0 0 20px var(--accent)}to{text-shadow:0 0 40px var(--accent),0 0 80px var(--accent)}}
.menu-section{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
.menu-section label{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:2px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 22px;font-size:15px;border:2px solid var(--accent);background:transparent;color:#eee;border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:hover,.btn.active{background:var(--accent);color:#fff;transform:scale(1.05)}
.btn-start{padding:14px 52px;font-size:20px;background:var(--accent);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .2s;font-family:inherit;font-weight:bold;letter-spacing:2px}
.btn-start:hover{transform:scale(1.08);box-shadow:0 0 30px var(--accent)}
.menu-best{font-size:15px;color:#f0a500}
.menu-achievements{font-size:13px;color:#888;cursor:pointer;text-decoration:underline}

/* ===== HUD ===== */
#hud{display:none;width:100%;max-width:600px;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:16px;padding:0 4px}
#hud-left{display:flex;gap:16px;align-items:center}
#combo-display{color:#f0a500;font-weight:bold;opacity:0;transition:opacity .3s}
#combo-display.visible{opacity:1}
#powerup-display{font-size:13px;color:#0ff}
.best-score{color:#f0a500}

/* ===== Canvas ===== */
#game-wrap{position:relative;display:none}
canvas#game{border:2px solid var(--accent);border-radius:6px;display:block}
#game-wrap.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-2px,4px)}80%{transform:translate(2px,-4px)}}

/* ===== CRT 扫描线 + 暗角覆盖 ===== */
#crt-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;border-radius:6px;overflow:hidden}
#crt-overlay::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);z-index:1}
#crt-overlay::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.45) 100%);z-index:2}

#msg{margin-top:12px;font-size:16px;color:var(--accent);height:22px}
#controls-hint{margin-top:8px;font-size:12px;color:#555}

/* ===== 触屏 ===== */
#touch-pad{display:none;margin-top:16px;width:160px;height:160px;position:relative}
#touch-pad button{position:absolute;width:50px;height:50px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#eee;font-size:22px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#touch-pad button:active{background:rgba(255,255,255,.2)}
.tp-up{top:0;left:50%;transform:translateX(-50%)}.tp-down{bottom:0;left:50%;transform:translateX(-50%)}
.tp-left{top:50%;left:0;transform:translateY(-50%)}.tp-right{top:50%;right:0;transform:translateY(-50%)}

/* ===== 粒子 ===== */
#particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15}

/* ===== 成就弹窗 ===== */
#achievement-popup{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.95);border:2px solid #f0a500;border-radius:12px;padding:12px 24px;z-index:30;display:none;text-align:center;animation:popIn .4s}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#achievement-popup .ach-icon{font-size:28px}
#achievement-popup .ach-title{color:#f0a500;font-weight:bold;font-size:15px}
#achievement-popup .ach-desc{color:#aaa;font-size:12px}

/* ===== 成就列表面板 ===== */
#achievements-panel{position:absolute;z-index:25;background:rgba(10,10,30,.97);border:2px solid var(--accent);border-radius:12px;padding:20px;max-width:380px;width:90%;max-height:70vh;overflow-y:auto;display:none}
#achievements-panel h2{text-align:center;margin-bottom:12px;color:var(--accent)}
.ach-item{display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid rgba(255,255,255,.05)}
.ach-item.locked{opacity:.4}
.ach-item .ach-i{font-size:24px;width:36px;text-align:center}
.ach-item .ach-info{flex:1}
.ach-item .ach-name{font-size:14px;font-weight:bold}
.ach-item .ach-d{font-size:11px;color:#888}
#close-ach{position:absolute;top:8px;right:12px;background:none;border:none;color:#eee;font-size:20px;cursor:pointer}

/* ===== 音乐按钮 ===== */
#music-toggle{position:fixed;top:12px;right:12px;z-index:20;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#eee;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* ===== 主题变量 ===== */
:root{--accent:#e94560;--bg:#0a0a1a;--grid-bg:#16213e;--grid-line:rgba(255,255,255,.03)}
body.theme-neon{--accent:#0ff;--bg:#0a0014;--grid-bg:#0d0028;--grid-line:rgba(0,255,255,.04)}
body.theme-retro{--accent:#ff6b35;--bg:#1a1000;--grid-bg:#2a1800;--grid-line:rgba(255,107,53,.05)}
body.theme-cyber{--accent:#bf00ff;--bg:#05000a;--grid-bg:#0f0018;--grid-line:rgba(191,0,255,.04)}
body{background:var(--bg)}
canvas#game{border-color:var(--accent);background:var(--grid-bg)}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<button id="music-toggle" title="背景音乐">&#9834;</button>

<!-- 成就弹窗 -->
<div id="achievement-popup"><div class="ach-icon"></div><div class="ach-title"></div><div class="ach-desc"></div></div>

<!-- 成就面板 -->
<div id="achievements-panel"><button id="close-ach">&times;</button><h2>成就</h2><div id="ach-list"></div></div>

<!-- 菜单 -->
<div id="menu">
  <h1>贪吃蛇</h1>
  <div class="menu-best" id="menu-best"></div>

  <div class="menu-section"><label>游戏模式</label>
    <div class="btn-row" id="mode-btns">
      <button class="btn active" data-mode="classic">经典</button>
      <button class="btn" data-mode="nowalls">穿墙</button>
      <button class="btn" data-mode="maze">迷宫</button>
      <button class="btn" data-mode="speed">极速</button>
    </div>
  </div>

  <div class="menu-section"><label>难度</label>
    <div class="btn-row" id="diff-btns">
      <button class="btn" data-diff="easy">简单</button>
      <button class="btn active" data-diff="normal">普通</button>
      <button class="btn" data-diff="hard">困难</button>
    </div>
  </div>

  <div class="menu-section"><label>主题</label>
    <div class="btn-row" id="theme-btns">
      <button class="btn active" data-theme="default">霓虹红</button>
      <button class="btn" data-theme="neon">赛博青</button>
      <button class="btn" data-theme="retro">复古橙</button>
      <button class="btn" data-theme="cyber">幻紫</button>
    </div>
  </div>

  <button class="btn-start" id="start-btn">开始游戏</button>
  <div class="menu-achievements" id="show-ach-btn">查看成就</div>
</div>

<!-- 游戏 -->
<div id="hud">
  <div id="hud-left">
    <span id="score">0</span>
    <span id="combo-display"></span>
  </div>
  <span id="powerup-display"></span>
  <span class="best-score" id="best-display"></span>
</div>
<div id="game-wrap">
  <canvas id="game"></canvas>
  <div id="crt-overlay"></div>
</div>
<div id="msg"></div>
<div id="controls-hint">方向键/WASD 移动 · 空格暂停 · R重开 · ESC菜单</div>

<div id="touch-pad">
  <button class="tp-up" data-dir="up">&#9650;</button>
  <button class="tp-down" data-dir="down">&#9660;</button>
  <button class="tp-left" data-dir="left">&#9664;</button>
  <button class="tp-right" data-dir="right">&#9654;</button>
</div>

<script>
// ============================================================
//  贪吃蛇 ULTIMATE — 高级视觉版
// ============================================================

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const msgEl = $('#msg');

// ===== 主题 =====
const THEMES = {
  default: { class: '', snake: [145, 80], food: '#e94560', accent: '#e94560', trail: 'rgba(233,69,96,0.15)' },
  neon:    { class: 'theme-neon', snake: [180, 90], food: '#0ff', accent: '#0ff', trail: 'rgba(0,255,255,0.15)' },
  retro:   { class: 'theme-retro', snake: [25, 85], food: '#ff6b35', accent: '#ff6b35', trail: 'rgba(255,107,53,0.15)' },
  cyber:   { class: 'theme-cyber', snake: [280, 80], food: '#bf00ff', accent: '#bf00ff', trail: 'rgba(191,0,255,0.15)' },
};
let currentTheme = 'default';

function applyTheme(t) {
  currentTheme = t;
  document.body.className = THEMES[t].class;
}

// ===== 音效 =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, endFreq, dur, type = 'sine', vol = 0.25) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function playEat()    { playTone(587, 880, 0.12, 'sine', 0.25); }
function playBonusEat(){ playTone(700, 1200, 0.15, 'sine', 0.3); setTimeout(() => playTone(900, 1400, 0.12, 'sine', 0.25), 80); }
function playGold()   { playTone(800, 1600, 0.1, 'sine', 0.3); setTimeout(() => playTone(1000, 1800, 0.1, 'sine', 0.3), 60); setTimeout(() => playTone(1200, 2000, 0.15, 'sine', 0.25), 120); }
function playPowerup(){ playTone(400, 800, 0.15, 'triangle', 0.2); setTimeout(() => playTone(600, 1000, 0.2, 'triangle', 0.2), 100); }
function playDie()    { playTone(300, 80, 0.4, 'sawtooth', 0.25); }
function playCombo()  { playTone(1000, 1500, 0.08, 'sine', 0.15); }
function playAchieve(){ playTone(523, 784, 0.15, 'sine', 0.2); setTimeout(() => playTone(659, 1047, 0.2, 'sine', 0.2), 150); }

// ===== 动态五声音阶 BGM =====
let bgmPlaying = false;
let bgmInterval;
const PENTATONIC = [262, 294, 330, 392, 440, 524, 588, 660, 784, 880];
let bgmMood = 0; // 0=calm, escalates with score

function startBGM() {
  ensureAudio();
  if (bgmPlaying) return;
  bgmPlaying = true;
  $('#music-toggle').textContent = '♫';

  let step = 0;
  let lastNote = 0;

  bgmInterval = setInterval(() => {
    if (!bgmPlaying) return;
    const t = audioCtx.currentTime;

    // 根据 bgmMood 选择音域范围
    const baseIdx = Math.min(Math.floor(bgmMood / 100), 4);
    const range = PENTATONIC.slice(baseIdx, baseIdx + 5);

    // 随机跳跃式旋律，避免重复
    let noteIdx;
    do { noteIdx = Math.floor(Math.random() * range.length); } while (noteIdx === lastNote && range.length > 1);
    lastNote = noteIdx;
    const note = range[noteIdx];

    // 主音
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = step % 4 === 0 ? 'triangle' : 'sine';
    o.frequency.setValueAtTime(note, t);
    g.gain.setValueAtTime(0.045, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.start(t); o.stop(t + 0.35);

    // 每4拍加一个低音和弦
    if (step % 4 === 0) {
      const bass = audioCtx.createOscillator();
      const bg = audioCtx.createGain();
      bass.connect(bg); bg.connect(audioCtx.destination);
      bass.type = 'sine';
      bass.frequency.setValueAtTime(note / 2, t);
      bg.gain.setValueAtTime(0.03, t);
      bg.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      bass.start(t); bass.stop(t + 0.5);
    }

    step++;
  }, 280 - Math.min(bgmMood, 200) * 0.4);
}

function stopBGM() {
  bgmPlaying = false;
  $('#music-toggle').textContent = '♪';
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function restartBGM() {
  if (!bgmPlaying) return;
  stopBGM();
  bgmPlaying = true;
  startBGM();
}

$('#music-toggle').addEventListener('click', () => {
  ensureAudio();
  bgmPlaying ? stopBGM() : startBGM();
});

// ===== 粒子 =====
const pCanvas = $('#particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeP() { pCanvas.width = innerWidth; pCanvas.height = innerHeight; }
addEventListener('resize', resizeP); resizeP();

function spawnP(x, y, color, count, sizeRange = [2, 5], speedRange = [1, 4]) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
    particles.push({
      x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 1, decay: 0.015 + Math.random() * 0.025,
      size: sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]),
      color
    });
  }
}

function spawnText(x, y, text, color) {
  particles.push({ x, y, vx: 0, vy: -1.5, life: 1, decay: 0.02, size: 0, color, text, isText: true });
}

// 冲击波涟漪
let ripples = [];
function spawnRipple(x, y, color, maxRadius = 60) {
  ripples.push({ x, y, color, radius: 5, maxRadius, alpha: 0.6 });
}

function updateP() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  // 粒子
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    pCtx.globalAlpha = p.life;
    if (p.isText) {
      pCtx.fillStyle = p.color;
      pCtx.font = 'bold 18px sans-serif';
      pCtx.textAlign = 'center';
      pCtx.fillText(p.text, p.x, p.y);
    } else {
      pCtx.fillStyle = p.color;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      pCtx.fill();
    }
  }

  // 涟漪
  ripples = ripples.filter(r => r.alpha > 0.01);
  for (const r of ripples) {
    r.radius += 3;
    r.alpha *= 0.92;
    pCtx.globalAlpha = r.alpha;
    pCtx.strokeStyle = r.color;
    pCtx.lineWidth = 2.5;
    pCtx.beginPath();
    pCtx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    pCtx.stroke();
    // 内层涟漪
    if (r.radius > 15) {
      pCtx.globalAlpha = r.alpha * 0.4;
      pCtx.lineWidth = 1;
      pCtx.beginPath();
      pCtx.arc(r.x, r.y, r.radius * 0.6, 0, Math.PI * 2);
      pCtx.stroke();
    }
  }

  pCtx.globalAlpha = 1;
  requestAnimationFrame(updateP);
}
updateP();

// ===== 成就系统 =====
const ACHIEVEMENTS = [
  { id: 'first_blood',  icon: '🩸', name: '初见', desc: '第一次吃到食物' },
  { id: 'score_100',    icon: '💯', name: '百分选手', desc: '单局得分达到 100' },
  { id: 'score_500',    icon: '🔥', name: '火力全开', desc: '单局得分达到 500' },
  { id: 'score_1000',   icon: '👑', name: '蛇王', desc: '单局得分达到 1000' },
  { id: 'combo_3',      icon: '⚡', name: '三连击', desc: '达成 3 连击' },
  { id: 'combo_5',      icon: '💥', name: '五连杀', desc: '达成 5 连击' },
  { id: 'combo_10',     icon: '🌟', name: '超神', desc: '达成 10 连击' },
  { id: 'gold_eat',     icon: '🥇', name: '淘金者', desc: '吃到金色食物' },
  { id: 'powerup_5',    icon: '💊', name: '道具达人', desc: '累计拾取 5 个道具' },
  { id: 'survive_60',   icon: '⏱️', name: '持久战', desc: '单局存活 60 秒' },
  { id: 'survive_180',  icon: '🏆', name: '耐力王', desc: '单局存活 180 秒' },
  { id: 'nowalls_win',  icon: '🌀', name: '穿越者', desc: '在穿墙模式得分 200+' },
  { id: 'maze_win',     icon: '🧱', name: '迷宫大师', desc: '在迷宫模式得分 200+' },
  { id: 'speed_win',    icon: '⚡', name: '闪电侠', desc: '在极速模式得分 200+' },
  { id: 'long_snake',   icon: '🐍', name: '巨蟒', desc: '蛇身长度达到 30' },
  { id: 'invincible',   icon: '🛡️', name: '无敌', desc: '使用无敌道具撞墙存活' },
];

function getUnlocked() {
  return JSON.parse(localStorage.getItem('snake_ach') || '[]');
}
function unlockAch(id) {
  const list = getUnlocked();
  if (list.includes(id)) return;
  list.push(id);
  localStorage.setItem('snake_ach', JSON.stringify(list));
  const a = ACHIEVEMENTS.find(a => a.id === id);
  if (!a) return;
  playAchieve();
  const popup = $('#achievement-popup');
  popup.querySelector('.ach-icon').textContent = a.icon;
  popup.querySelector('.ach-title').textContent = a.name;
  popup.querySelector('.ach-desc').textContent = a.desc;
  popup.style.display = 'block';
  setTimeout(() => popup.style.display = 'none', 3000);
}

function renderAchPanel() {
  const unlocked = getUnlocked();
  const list = $('#ach-list');
  list.innerHTML = '';
  for (const a of ACHIEVEMENTS) {
    const done = unlocked.includes(a.id);
    list.innerHTML += `<div class="ach-item ${done ? '' : 'locked'}"><div class="ach-i">${done ? a.icon : '🔒'}</div><div class="ach-info"><div class="ach-name">${a.name}</div><div class="ach-d">${a.desc}</div></div></div>`;
  }
}

$('#show-ach-btn').addEventListener('click', () => { renderAchPanel(); $('#achievements-panel').style.display = 'block'; });
$('#close-ach').addEventListener('click', () => { $('#achievements-panel').style.display = 'none'; });

// ===== 游戏核心 =====
const canvas = $('#game');
const ctx = canvas.getContext('2d');
const COLS = 20, ROWS = 20;
let GRID = 20;

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth * 0.92, 600);
  const maxH = window.innerHeight * 0.55;
  const maxSize = Math.min(maxW, maxH);
  GRID = Math.floor(maxSize / COLS);
  canvas.width = GRID * COLS;
  canvas.height = GRID * ROWS;
  $('#hud').style.width = canvas.width + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const DIFF = {
  easy:   { speed: 150, accel: 1, min: 85 },
  normal: { speed: 110, accel: 2, min: 55 },
  hard:   { speed: 70,  accel: 3, min: 35 },
};

const FOOD_TYPES = [
  { type: 'normal', color: null, points: 10, weight: 60 },
  { type: 'bonus',  color: '#00ff88', points: 25, weight: 20 },
  { type: 'gold',   color: '#ffd700', points: 50, weight: 8, duration: 5000 },
  { type: 'shrink', color: '#ff69b4', points: 5, weight: 7 },
  { type: 'speed_food', color: '#00bfff', points: 15, weight: 5 },
];

const POWERUP_TYPES = [
  { type: 'double',     icon: 'x2',  color: '#ffd700', desc: '双倍积分', duration: 8000 },
  { type: 'slow',       icon: '🐢',  color: '#00ff88', desc: '减速', duration: 6000 },
  { type: 'invincible', icon: '🛡️',  color: '#0ff',    desc: '无敌', duration: 5000 },
  { type: 'shrink_pw',  icon: '✂️',  color: '#ff69b4', desc: '缩短', duration: 0 },
];

let selectedMode = 'classic', selectedDiff = 'normal';
let snake, dir, nextDir, food, foodType, foodTimer;
let powerup, activePowerups, powerupTimers;
let score, combo, comboTimer, lastEatTime;
let running, gameOver, paused, speed, timer;
let mazeWalls, startTime, totalPowerupsCollected;
let foodPulse = 0, screenShake = 0;
let animFrame;

// ===== 蛇身残影/拖尾系统 =====
let trail = []; // { x, y, alpha, hue }
const TRAIL_MAX = 80;

// ===== 输入缓冲队列 =====
let inputQueue = [];
const INPUT_QUEUE_MAX = 3;

// ===== 插值状态 =====
let lastUpdateTime = 0;
let lerpProgress = 1; // 0..1 当前帧进度
let prevSnake = []; // 上一帧蛇身位置

// Menu buttons
function setupBtnGroup(selector, callback) {
  $$(selector).forEach(btn => {
    btn.addEventListener('click', () => {
      $$(selector).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      callback(btn);
    });
  });
}
setupBtnGroup('#mode-btns .btn', b => selectedMode = b.dataset.mode);
setupBtnGroup('#diff-btns .btn', b => selectedDiff = b.dataset.diff);
setupBtnGroup('#theme-btns .btn', b => applyTheme(b.dataset.theme));

function getBest(mode = selectedMode) { return parseInt(localStorage.getItem(`snake_best_${mode}`) || '0', 10); }
function saveBest(s, mode = selectedMode) { if (s > getBest(mode)) localStorage.setItem(`snake_best_${mode}`, s); }
function showBest() {
  const b = getBest();
  $('#best-display').textContent = b > 0 ? `最高 ${b}` : '';
  $('#menu-best').textContent = b > 0 ? `历史最高分: ${b} (${selectedMode})` : '';
}

// Maze generation (Set-based O(1) lookup)
function generateMaze() {
  const wallSet = new Set();
  const add = (x, y) => wallSet.add(x * ROWS + y);
  const patterns = [
    () => { for (let i = 6; i < 14; i++) { add(10, i); add(i, 10); }},
    () => { for (let i = 3; i < 7; i++) for (let j = 3; j < 7; j++) { add(i, j); add(COLS-1-i, j); add(i, ROWS-1-j); add(COLS-1-i, ROWS-1-j); }},
    () => { for (let i = 4; i < 16; i++) { add(i, 5); add(i, 14); add(5, i); add(14, i); }},
    () => { for (let i = 0; i < 30; i++) { const x = 2 + Math.floor(Math.random()*(COLS-4)); const y = 2 + Math.floor(Math.random()*(ROWS-4)); if (Math.abs(x-10) > 2 || Math.abs(y-10) > 2) add(x, y); }},
  ];
  patterns[Math.floor(Math.random() * patterns.length)]();
  return wallSet;
}

function isWall(x, y) {
  return mazeWalls && mazeWalls.has(x * ROWS + y);
}

function canvasToScreen(gx, gy) {
  const r = canvas.getBoundingClientRect();
  return { x: r.left + gx * GRID + GRID / 2, y: r.top + gy * GRID + GRID / 2 };
}

// Food
function pickFoodType() {
  const total = FOOD_TYPES.reduce((s, f) => s + f.weight, 0);
  let r = Math.random() * total;
  for (const f of FOOD_TYPES) { r -= f.weight; if (r <= 0) return f; }
  return FOOD_TYPES[0];
}

function placeFood() {
  clearTimeout(foodTimer);
  foodType = pickFoodType();
  let pos, attempts = 0;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    attempts++;
  } while ((snake.some(s => s.x === pos.x && s.y === pos.y) || isWall(pos.x, pos.y)) && attempts < 500);
  food = pos;
  foodPulse = 0;
  if (foodType.type === 'gold') {
    foodTimer = setTimeout(() => { if (!gameOver) placeFood(); }, foodType.duration);
  }
}

// Powerup
function placePowerup() {
  if (powerup || Math.random() > 0.15) return;
  const pw = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  let pos, attempts = 0;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    attempts++;
  } while ((snake.some(s => s.x === pos.x && s.y === pos.y) || isWall(pos.x, pos.y) || (food && pos.x === food.x && pos.y === food.y)) && attempts < 500);
  powerup = { ...pw, ...pos };
  setTimeout(() => { if (powerup && powerup.x === pos.x && powerup.y === pos.y) powerup = null; }, 10000);
}

function activatePowerup(pw) {
  totalPowerupsCollected++;
  if (totalPowerupsCollected >= 5) unlockAch('powerup_5');
  playPowerup();
  const sp = canvasToScreen(pw.x, pw.y);
  spawnP(sp.x, sp.y, pw.color, 20, [3, 6]);
  spawnText(sp.x, sp.y - 20, pw.desc, pw.color);

  if (pw.type === 'shrink_pw') {
    const removeCount = Math.min(5, snake.length - 1);
    for (let i = 0; i < removeCount; i++) snake.pop();
    return;
  }

  if (activePowerups[pw.type]) clearTimeout(powerupTimers[pw.type]);
  activePowerups[pw.type] = true;
  powerupTimers[pw.type] = setTimeout(() => { activePowerups[pw.type] = false; }, pw.duration);

  if (pw.type === 'slow') {
    speed = Math.min(speed + 40, 200);
    clearInterval(timer);
    timer = setInterval(update, speed);
  }
}

// Combo
function addCombo() {
  const now = Date.now();
  if (now - lastEatTime < 2500) {
    combo++;
    playCombo();
    if (combo >= 3) unlockAch('combo_3');
    if (combo >= 5) unlockAch('combo_5');
    if (combo >= 10) unlockAch('combo_10');
  } else {
    combo = 1;
  }
  lastEatTime = now;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { combo = 0; updateHUD(); }, 2500);
}

function getComboMultiplier() {
  if (combo < 2) return 1;
  if (combo < 5) return 1.5;
  if (combo < 10) return 2;
  return 3;
}

function updateHUD() {
  const comboEl = $('#combo-display');
  if (combo >= 2) {
    comboEl.textContent = `${combo}连击 x${getComboMultiplier()}`;
    comboEl.classList.add('visible');
  } else {
    comboEl.classList.remove('visible');
  }

  const pwEl = $('#powerup-display');
  const active = Object.entries(activePowerups).filter(([k, v]) => v).map(([k]) => {
    const pw = POWERUP_TYPES.find(p => p.type === k);
    return pw ? pw.icon : '';
  });
  pwEl.textContent = active.join(' ');
}

// ===== 绘制 (带插值) =====
function lerp(a, b, t) { return a + (b - a) * t; }

function draw() {
  const now = performance.now();
  // 计算插值进度
  if (running && !paused && !gameOver && speed > 0) {
    lerpProgress = Math.min((now - lastUpdateTime) / speed, 1);
  } else {
    lerpProgress = 1;
  }

  ctx.save();

  // 屏幕震动
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake;
    const sy = (Math.random() - 0.5) * screenShake;
    ctx.translate(sx, sy);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20);

  const theme = THEMES[currentTheme];

  // 网格 — 用 path 批量绘制替代逐格 strokeRect
  ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--grid-line') || 'rgba(255,255,255,.03)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i <= COLS; i++) { ctx.moveTo(i * GRID, 0); ctx.lineTo(i * GRID, ROWS * GRID); }
  for (let j = 0; j <= ROWS; j++) { ctx.moveTo(0, j * GRID); ctx.lineTo(COLS * GRID, j * GRID); }
  ctx.stroke();

  // 迷宫墙壁 — 带呼吸光效
  if (mazeWalls) {
    const wallGlow = 3 + Math.sin(now * 0.003) * 2;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.shadowColor = theme.accent;
    ctx.shadowBlur = wallGlow;
    for (const key of mazeWalls) {
      const wx = Math.floor(key / ROWS);
      const wy = key % ROWS;
      ctx.fillRect(wx * GRID + 1, wy * GRID + 1, GRID - 2, GRID - 2);
    }
    ctx.shadowBlur = 0;
  }

  // 道具 — 旋转动画
  if (powerup) {
    const px = powerup.x * GRID + GRID / 2;
    const py = powerup.y * GRID + GRID / 2;
    const pwPulse = Math.sin(now * 0.005) * 2;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(now * 0.002);
    ctx.fillStyle = powerup.color;
    ctx.shadowColor = powerup.color;
    ctx.shadowBlur = 12 + pwPulse;
    ctx.beginPath();
    // 六边形
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i - Math.PI / 2;
      const r = GRID / 2 - 1 + pwPulse;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](Math.cos(angle) * r, Math.sin(angle) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.rotate(-now * 0.002);
    ctx.fillStyle = '#000';
    ctx.font = `bold ${Math.round(GRID * 0.5)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(powerup.icon, 0, 0);
    ctx.restore();
  }

  // 食物 — 高级脉冲
  foodPulse += 0.08;
  const pulse = Math.sin(foodPulse) * 2.5;
  const fColor = foodType.color || theme.food;
  // 食物底部光晕
  ctx.fillStyle = fColor;
  ctx.globalAlpha = 0.12 + Math.sin(foodPulse * 1.5) * 0.08;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID * 0.9, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // 食物主体
  ctx.fillStyle = fColor;
  ctx.shadowColor = fColor;
  ctx.shadowBlur = 10 + pulse * 3;
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, Math.max(GRID / 2 - 2 + pulse, 3), 0, Math.PI * 2);
  ctx.fill();
  // 金色食物双层光环
  if (foodType.type === 'gold') {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.3 + Math.sin(foodPulse * 2) * 0.3;
    ctx.beginPath();
    ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 + 3 + pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 0.15 + Math.sin(foodPulse * 3) * 0.15;
    ctx.beginPath();
    ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 + 7 + pulse * 1.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;

  // ===== 蛇身拖尾残影 =====
  for (let i = trail.length - 1; i >= 0; i--) {
    const t = trail[i];
    t.alpha -= 0.025;
    if (t.alpha <= 0) { trail.splice(i, 1); continue; }
    ctx.globalAlpha = t.alpha * 0.4;
    ctx.fillStyle = `hsl(${t.hue}, 70%, 45%)`;
    const r = 3;
    const x = t.x * GRID + 2;
    const y = t.y * GRID + 2;
    const w = GRID - 4;
    const h = GRID - 4;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ===== 蛇 (带插值) =====
  const isInvincible = activePowerups && activePowerups.invincible;
  const snakeHue = theme.snake[0];
  const snakeSat = theme.snake[1];

  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const t = 1 - i / (snake.length || 1);
    const light = 28 + t * 32;

    // 插值坐标
    let drawX = seg.x;
    let drawY = seg.y;
    if (prevSnake[i] && lerpProgress < 1 && running && !paused && !gameOver) {
      let px = prevSnake[i].x;
      let py = prevSnake[i].y;
      // 处理穿墙跳跃（坐标差大于 1 不插值）
      if (Math.abs(seg.x - px) <= 1 && Math.abs(seg.y - py) <= 1) {
        drawX = lerp(px, seg.x, lerpProgress);
        drawY = lerp(py, seg.y, lerpProgress);
      }
    }

    if (isInvincible) {
      ctx.fillStyle = `hsl(${(now / 10 + i * 20) % 360}, 100%, 60%)`;
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
    } else {
      ctx.fillStyle = `hsl(${snakeHue + (1 - t) * 25}, ${snakeSat}%, ${light}%)`;
      ctx.shadowBlur = i === 0 ? 6 : 0;
      if (i === 0) ctx.shadowColor = `hsl(${snakeHue}, 100%, 60%)`;
    }

    const r = GRID > 15 ? 5 : 3;
    const x = drawX * GRID + 1;
    const y = drawY * GRID + 1;
    const w = GRID - 2;
    const h = GRID - 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // 蛇头
    if (i === 0) {
      const cx = drawX * GRID + GRID / 2;
      const cy = drawY * GRID + GRID / 2;

      // 发光核心
      ctx.shadowColor = isInvincible ? '#fff' : `hsl(${snakeHue}, 100%, 70%)`;
      ctx.shadowBlur = 12;
      ctx.fillStyle = isInvincible ? '#fff' : `hsl(${snakeHue}, 100%, 70%)`;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(cx, cy, GRID * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;

      // 眼睛
      const ex = dir.x || 0, ey = dir.y || 0;
      const eyeOff = GRID * 0.2;
      const eyePerp = GRID * 0.15;
      const eyeR = GRID * 0.12;
      const pupilR = GRID * 0.06;
      const pupilOff = GRID * 0.05;
      // 白色眼球
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx + ex * eyeOff - ey * eyePerp, cy + ey * eyeOff + ex * eyePerp, eyeR, 0, Math.PI * 2);
      ctx.arc(cx + ex * eyeOff + ey * eyePerp, cy + ey * eyeOff - ex * eyePerp, eyeR, 0, Math.PI * 2);
      ctx.fill();
      // 黑色瞳孔
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx + ex * (eyeOff + pupilOff) - ey * eyePerp, cy + ey * (eyeOff + pupilOff) + ex * eyePerp, pupilR, 0, Math.PI * 2);
      ctx.arc(cx + ex * (eyeOff + pupilOff) + ey * eyePerp, cy + ey * (eyeOff + pupilOff) - ex * eyePerp, pupilR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 暂停
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,.6)';
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);
    ctx.fillStyle = '#f0a500';
    ctx.font = `bold ${GRID * 2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('暂停', canvas.width / 2, canvas.height / 2 - 10);
    ctx.font = `${GRID * 0.8}px sans-serif`;
    ctx.fillStyle = '#888';
    ctx.fillText('按空格继续', canvas.width / 2, canvas.height / 2 + GRID * 1.2);
  }

  // 游戏结束
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,.7)';
    ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);
    ctx.fillStyle = theme.accent;
    ctx.font = `bold ${GRID * 2.2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - GRID * 1.5);
    ctx.font = `${GRID * 1.1}px sans-serif`;
    ctx.fillStyle = '#eee';
    ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 5);
    if (score > 0 && score >= getBest()) {
      ctx.fillStyle = '#f0a500';
      ctx.font = `bold ${GRID}px sans-serif`;
      ctx.fillText('🏆 新纪录！', canvas.width / 2, canvas.height / 2 + GRID * 1.8);
    }
    ctx.font = `${GRID * 0.7}px sans-serif`;
    ctx.fillStyle = '#888';
    ctx.fillText('R 重开 · ESC 菜单', canvas.width / 2, canvas.height / 2 + GRID * 3.2);
  }

  ctx.restore();
}

function animLoop() {
  draw();
  updateHUD();
  if (running && !gameOver && !paused) {
    const alive = (Date.now() - startTime) / 1000;
    if (alive >= 60) unlockAch('survive_60');
    if (alive >= 180) unlockAch('survive_180');
  }
  animFrame = requestAnimationFrame(animLoop);
}

// ===== 更新 =====
function update() {
  if (paused || gameOver) return;

  // 保存上一帧蛇身位置（用于插值）
  prevSnake = snake.map(s => ({ x: s.x, y: s.y }));
  lastUpdateTime = performance.now();

  // 从输入队列取出方向
  if (inputQueue.length > 0) {
    const nd = inputQueue.shift();
    if (!(nd.x === -dir.x && nd.y === -dir.y && snake.length > 1)) {
      nextDir = nd;
    }
  }

  dir = { ...nextDir };
  let head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 穿墙模式
  if (selectedMode === 'nowalls' || selectedMode === 'speed') {
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;
  }

  // 碰撞
  const hitWall = head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS;
  const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);
  const hitMaze = isWall(head.x, head.y);

  if (hitWall || hitSelf || hitMaze) {
    if (activePowerups.invincible) {
      unlockAch('invincible');
      if (hitWall) {
        head.x = Math.max(0, Math.min(COLS - 1, head.x));
        head.y = Math.max(0, Math.min(ROWS - 1, head.y));
        nextDir = { x: -dir.x, y: -dir.y };
        dir = { ...nextDir };
        head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      } else if (hitSelf || hitMaze) {
        return;
      }
    } else {
      // 死亡
      gameOver = true;
      running = false;
      clearInterval(timer);
      clearTimeout(foodTimer);
      saveBest(score);
      showBest();
      playDie();
      screenShake = 15;
      $('#game-wrap').classList.add('shake');
      setTimeout(() => $('#game-wrap').classList.remove('shake'), 300);
      const sp = canvasToScreen(snake[0].x, snake[0].y);
      spawnP(sp.x, sp.y, theme.food, 40, [2, 7], [1, 5]);
      spawnRipple(sp.x, sp.y, theme.accent, 100);
      // 死亡时蛇身逐节爆炸
      for (let i = 0; i < Math.min(snake.length, 15); i++) {
        const s = canvasToScreen(snake[i].x, snake[i].y);
        setTimeout(() => spawnP(s.x, s.y, `hsl(${THEMES[currentTheme].snake[0]}, 80%, 50%)`, 8, [2, 5], [1, 6]), i * 40);
      }
      msgEl.textContent = 'R 重新开始 · ESC 返回菜单';
      if (selectedMode === 'nowalls' && score >= 200) unlockAch('nowalls_win');
      if (selectedMode === 'maze' && score >= 200) unlockAch('maze_win');
      if (selectedMode === 'speed' && score >= 200) unlockAch('speed_win');
      return;
    }
  }

  // 添加拖尾残影
  if (snake.length > 0 && (dir.x !== 0 || dir.y !== 0)) {
    const theme = THEMES[currentTheme];
    for (let i = 0; i < snake.length; i += 2) {
      trail.push({
        x: snake[i].x, y: snake[i].y,
        alpha: 0.6 - i * 0.02,
        hue: theme.snake[0] + (1 - i / snake.length) * 25
      });
    }
    while (trail.length > TRAIL_MAX) trail.shift();
  }

  snake.unshift(head);

  // 吃食物
  if (head.x === food.x && head.y === food.y) {
    addCombo();
    let pts = foodType.points;
    pts = Math.round(pts * getComboMultiplier());
    if (activePowerups.double) pts *= 2;

    score += pts;
    $('#score').textContent = score;
    bgmMood = score; // 更新 BGM 节奏

    // 食物音效、粒子和冲击波
    const sp = canvasToScreen(food.x, food.y);
    if (foodType.type === 'gold') {
      playGold();
      spawnP(sp.x, sp.y, '#ffd700', 30, [3, 8]);
      spawnRipple(sp.x, sp.y, '#ffd700', 80);
      unlockAch('gold_eat');
    } else if (foodType.type === 'bonus') {
      playBonusEat();
      spawnP(sp.x, sp.y, '#00ff88', 20, [2, 6]);
      spawnRipple(sp.x, sp.y, '#00ff88', 50);
    } else {
      playEat();
      spawnP(sp.x, sp.y, THEMES[currentTheme].food, 12);
      spawnRipple(sp.x, sp.y, THEMES[currentTheme].food, 40);
    }

    spawnText(sp.x, sp.y - 20, `+${pts}`, '#fff');
    if (combo >= 2) spawnText(sp.x, sp.y - 40, `${combo} COMBO!`, '#f0a500');

    if (foodType.type === 'shrink' && snake.length > 3) {
      for (let i = 0; i < 3; i++) snake.pop();
    }

    if (foodType.type === 'speed_food') {
      speed = Math.max(speed - 10, DIFF[selectedDiff].min);
      clearInterval(timer);
      timer = setInterval(update, speed);
    }

    placeFood();
    placePowerup();

    const diff = DIFF[selectedDiff];
    const accel = selectedMode === 'speed' ? diff.accel * 2 : diff.accel;
    if (speed > diff.min) {
      speed -= accel;
      clearInterval(timer);
      timer = setInterval(update, speed);
      // 动态调整 BGM 速度
      if (bgmPlaying && score % 50 === 0) restartBGM();
    }

    unlockAch('first_blood');
    if (score >= 100) unlockAch('score_100');
    if (score >= 500) unlockAch('score_500');
    if (score >= 1000) unlockAch('score_1000');
    if (snake.length >= 30) unlockAch('long_snake');
  } else {
    snake.pop();
  }

  // 拾取道具
  if (powerup && head.x === powerup.x && head.y === powerup.y) {
    activatePowerup(powerup);
    powerup = null;
  }
}

// ===== 初始化 =====
function init() {
  cancelAnimationFrame(animFrame);
  clearInterval(timer);
  clearTimeout(foodTimer);
  const diff = DIFF[selectedDiff];
  snake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  prevSnake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  dir = { x: 0, y: 0 };
  nextDir = { x: 0, y: 0 };
  score = 0; combo = 0; lastEatTime = 0;
  running = false; gameOver = false; paused = false;
  speed = selectedMode === 'speed' ? Math.max(diff.speed - 30, 40) : diff.speed;
  activePowerups = {}; powerupTimers = {}; powerup = null;
  totalPowerupsCollected = 0; screenShake = 0;
  mazeWalls = selectedMode === 'maze' ? generateMaze() : null;
  startTime = Date.now();
  trail = [];
  inputQueue = [];
  bgmMood = 0;
  lastUpdateTime = performance.now();
  $('#score').textContent = '0';
  showBest();
  msgEl.textContent = '按方向键开始';
  placeFood();
  draw();
  updateHUD();
}

function startGame() {
  ensureAudio();
  $('#menu').style.display = 'none';
  $('#achievements-panel').style.display = 'none';
  $('#game-wrap').style.display = 'block';
  $('#hud').style.display = 'flex';
  if ('ontouchstart' in window) $('#touch-pad').style.display = 'block';
  resizeCanvas();
  init();
  animLoop();
}

function returnToMenu() {
  clearInterval(timer); clearTimeout(foodTimer); cancelAnimationFrame(animFrame);
  stopBGM();
  $('#game-wrap').style.display = 'none';
  $('#hud').style.display = 'none';
  $('#touch-pad').style.display = 'none';
  msgEl.textContent = '';
  $('#menu').style.display = 'flex';
  showBest();
}

$('#start-btn').addEventListener('click', startGame);

// ===== 输入 (带缓冲队列) =====
const dirMap = {
  arrowup:{x:0,y:-1},w:{x:0,y:-1},up:{x:0,y:-1},
  arrowdown:{x:0,y:1},s:{x:0,y:1},down:{x:0,y:1},
  arrowleft:{x:-1,y:0},a:{x:-1,y:0},left:{x:-1,y:0},
  arrowright:{x:1,y:0},d:{x:1,y:0},right:{x:1,y:0},
};

function handleDir(nd) {
  if (!nd || gameOver) return;

  // 确定当前"有效方向"（队列末尾或当前 nextDir）
  const effectiveDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : nextDir;
  // 禁止反向
  if (nd.x === -effectiveDir.x && nd.y === -effectiveDir.y && snake.length > 1) return;
  // 禁止同方向重复
  if (nd.x === effectiveDir.x && nd.y === effectiveDir.y) return;

  if (!running) {
    running = true;
    startTime = Date.now();
    lastUpdateTime = performance.now();
    msgEl.textContent = '';
    nextDir = nd;
    dir = { ...nd };
    timer = setInterval(update, speed);
    // 立即执行第一帧
    update();
  } else {
    // 加入输入缓冲队列
    if (inputQueue.length < INPUT_QUEUE_MAX) {
      inputQueue.push(nd);
    }
  }
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'escape') { returnToMenu(); return; }
  if (k === 'r') { init(); return; }
  if (k === ' ' && running && !gameOver) { e.preventDefault(); paused = !paused; msgEl.textContent = paused ? '已暂停' : ''; return; }
  const nd = dirMap[k];
  if (nd) { e.preventDefault(); handleDir(nd); }
});

$$('#touch-pad button').forEach(b => b.addEventListener('touchstart', e => { e.preventDefault(); handleDir(dirMap[b.dataset.dir]); }));

let tX, tY;
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; tX = t.clientX; tY = t.clientY; });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dx = t.clientX - tX, dy = t.clientY - tY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { if (running && !gameOver) { paused = !paused; msgEl.textContent = paused ? '已暂停' : ''; } return; }
  Math.abs(dx) > Math.abs(dy) ? handleDir(dx > 0 ? dirMap.right : dirMap.left) : handleDir(dy > 0 ? dirMap.down : dirMap.up);
});

showBest();
</script>
