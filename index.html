<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SNAKE</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="particles"></canvas>
<button id="music-toggle">&middot;</button>

<!-- 成就弹窗 -->
<div id="achievement-popup"><div class="ach-icon"></div><div class="ach-title"></div><div class="ach-desc"></div></div>

<!-- 成就面板 -->
<div id="achievements-panel">
  <button id="close-ach">&times;</button>
  <h2>成就</h2>
  <div id="ach-list"></div>
</div>

<!-- 统计面板 -->
<div id="stats-panel">
  <button id="close-stats">&times;</button>
  <h2>统计</h2>
  <div id="stats-content"></div>
</div>

<!-- 菜单 -->
<div id="menu">
  <h1>SNAKE</h1>
  <p class="menu-subtitle"></p>
  <div class="menu-best" id="menu-best"></div>

  <div class="menu-section">
    <div class="btn-row" id="mode-btns">
      <button class="btn active" data-mode="classic">经典</button>
      <button class="btn" data-mode="nowalls">穿墙</button>
      <button class="btn" data-mode="maze">迷宫</button>
      <button class="btn" data-mode="speed">极速</button>
      <button class="btn" data-mode="survival">生存</button>
      <button class="btn" data-mode="zen">禅</button>
    </div>
  </div>

  <div class="menu-section">
    <div class="btn-row" id="diff-btns">
      <button class="btn" data-diff="easy">简单</button>
      <button class="btn active" data-diff="normal">普通</button>
      <button class="btn" data-diff="hard">困难</button>
    </div>
  </div>

  <div class="menu-section">
    <div class="btn-row theme-dots" id="theme-btns">
      <button class="btn theme-dot active" data-theme="default" style="--dot-color:#00ff88" title="绿"></button>
      <button class="btn theme-dot" data-theme="neon" style="--dot-color:#00d4ff" title="青"></button>
      <button class="btn theme-dot" data-theme="retro" style="--dot-color:#ff6b35" title="橙"></button>
      <button class="btn theme-dot" data-theme="cyber" style="--dot-color:#bf5fff" title="紫"></button>
    </div>
  </div>

  <button class="btn-start" id="start-btn">START</button>
  <button class="btn-start" id="daily-btn" style="display:none">DAILY</button>

  <div class="menu-footer">
    <span class="menu-achievements" id="show-ach-btn">成就</span>
    <span class="menu-footer-sep">&middot;</span>
    <span class="menu-achievements" id="show-stats-btn">统计</span>
  </div>
</div>

<!-- 游戏 -->
<div id="hud">
  <div id="hud-left">
    <span id="score">0</span>
    <span id="combo-display"></span>
  </div>
  <span id="powerup-display"></span>
  <span class="best-score" id="best-display"></span>
</div>
<div id="game-wrap"><canvas id="game"></canvas></div>
<div id="msg"></div>
<div id="controls-hint">方向键 / WASD 移动 · 空格暂停 · R 重开 · ESC 菜单</div>

<div id="touch-pad">
  <button class="tp-up" data-dir="up">&#9650;</button>
  <button class="tp-down" data-dir="down">&#9660;</button>
  <button class="tp-left" data-dir="left">&#9664;</button>
  <button class="tp-right" data-dir="right">&#9654;</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
