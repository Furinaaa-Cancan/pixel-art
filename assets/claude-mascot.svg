<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" shape-rendering="crispEdges">
<!-- Claude 小动物 24x24 — pixelarticons 风格 path 合并 -->

<!-- 身体 #D4835B (x3-20, y3-12) -->
<path fill="#D4835B" d="M3 3h18v9H3z"/>

<!-- 身体底部暗色带 #B86A45 (y12-14) -->
<path fill="#B86A45" d="M3 12h18v2H3z"/>

<!-- 4条腿 #B86A45 (y14-18, 各3px宽, 间隔1px) -->
<!-- 腿1: x4-6, 腿2: x8-10, 腿3: x14-16, 腿4: x18-20 -->
<path fill="#B86A45" d="
  M4 14h3v4H4z
  M8 14h3v4H8z
  M14 14h3v4h-3z
  M18 14h3v4h-3z
"/>

<!-- 脚底 #9A5535 -->
<path fill="#9A5535" d="
  M4 17h3v1H4z
  M8 17h3v1H8z
  M14 17h3v1h-3z
  M18 17h3v1h-3z
"/>

<!-- 眼睛 #2A2A2A (2x2) -->
<path fill="#2A2A2A" d="M6 6h2v2H6zM16 6h2v2h-2z"/>

<!-- 嘴 #9A5535 -->
<path fill="#9A5535" d="M10 10h4v1h-4z"/>

</svg>
