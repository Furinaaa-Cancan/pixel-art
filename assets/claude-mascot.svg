<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 21" shape-rendering="crispEdges">
<!-- Claude 官方小动物像素画 -->
<!-- 扁平色块风格，参考官方像素图 -->
<!-- 主色: #D4835B  暗色: #B86A45  深暗: #A05A38  眼睛: #2A2A2A -->

<!-- 身体 (宽18 高11, 从x3到x21, y2到y13) -->
<rect x="3" y="2" width="18" height="9" fill="#D4835B"/>
<rect x="3" y="11" width="18" height="2" fill="#B86A45"/>

<!-- 左眼 2x2 -->
<rect x="6" y="5" width="2" height="2" fill="#2A2A2A"/>

<!-- 右眼 2x2 -->
<rect x="16" y="5" width="2" height="2" fill="#2A2A2A"/>

<!-- 嘴巴 小横线 -->
<rect x="10" y="9" width="4" height="1" fill="#A05A38"/>

<!-- 4条腿，两两一组，中间有间隔 -->
<!-- 左前腿 -->
<rect x="4" y="13" width="3" height="4" fill="#B86A45"/>
<rect x="4" y="16" width="3" height="1" fill="#A05A38"/>

<!-- 左后腿 -->
<rect x="8" y="13" width="3" height="4" fill="#B86A45"/>
<rect x="8" y="16" width="3" height="1" fill="#A05A38"/>

<!-- 右前腿 -->
<rect x="13" y="13" width="3" height="4" fill="#B86A45"/>
<rect x="13" y="16" width="3" height="1" fill="#A05A38"/>

<!-- 右后腿 -->
<rect x="17" y="13" width="3" height="4" fill="#B86A45"/>
<rect x="17" y="16" width="3" height="1" fill="#A05A38"/>

</svg>
