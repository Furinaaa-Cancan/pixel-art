<!--
  Clawd v5: 参考图临摹型 (Reference Faithful)
  身体约 20x11, 32x32 画布
  设计思路：尽量还原参考图的比例和细节
  - 身体宽度占画面约62%（20/32），高度约34%（11/32）
  - 腿两两一组：左边2条靠近、右边2条靠近，中间有大间隙
  - 眼睛小(1x1或2x1)且左右分开
  - 底部中间有一条极小的暗线模拟嘴巴
  - 顶部有细微高光
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 身体 主体 #D97757: x6-25, y8-18 (20px宽, 11px高) -->
  <path d="M6 8h20v11H6z" fill="#D97757"/>
  <!-- 高光 #E8956F: 顶部1px线 -->
  <path d="M7 8h18v1H7z" fill="#E8956F"/>
  <!-- 眼睛 #2A2A2A: 2x1 小眼睛, 位于上部1/3 (y11), 左右分开 -->
  <path d="M10 11h2v1h-2z M20 11h2v1h-2z" fill="#2A2A2A"/>
  <!-- 嘴巴 #C46A4A: 底部中间极小暗线 -->
  <path d="M15 17h2v1h-2z" fill="#C46A4A"/>
  <!-- 4条腿 #C46A4A: 两两一组，中间大间隙 -->
  <!-- 左组: x8(3px宽) 和 x12(3px宽), 间隙1px -->
  <!-- 右组: x18(3px宽) 和 x22(3px宽), 间隙1px -->
  <!-- 中间间隙: x15-17 (6px) -->
  <path d="M8 18h3v4H8z M12 18h3v4h-3z M18 18h3v4h-3z M22 18h3v4h-3z" fill="#C46A4A"/>
</svg>
