<!--
  Clawd v1: 紧凑型 (Compact)
  身体 18x10, 32x32 画布
  设计思路：最紧凑的版本，身体18px宽10px高，比例1.8:1
  四条短腿(3x4)均匀分布，整体小巧可爱
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 身体 主体 #D97757: x7-24, y8-17 (18px宽, 10px高) -->
  <path d="M7 8h18v10H7z" fill="#D97757"/>
  <!-- 眼睛 #2A2A2A: 2x2 at (10,10) 和 (20,10) -->
  <path d="M10 10h2v2h-2z M20 10h2v2h-2z" fill="#2A2A2A"/>
  <!-- 4条腿 #C46A4A: 各3px宽 x 4px高, 从y17开始 -->
  <!-- 左1: x9 左2: x13 右1: x16 右2: x20 -->
  <path d="M9 17h3v4H9z M13 17h3v4h-3z M16 17h3v4h-3z M20 17h3v4h-3z" fill="#C46A4A"/>
</svg>
