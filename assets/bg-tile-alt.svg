<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Base fill - slightly lighter -->
  <rect x="0" y="0" width="16" height="16" fill="#131c2e"/>
  <!-- Grid lines - horizontal -->
  <rect x="0" y="0" width="16" height="1" fill="#1e293b" opacity="0.25"/>
  <rect x="0" y="4" width="16" height="1" fill="#1e293b" opacity="0.25"/>
  <rect x="0" y="8" width="16" height="1" fill="#1e293b" opacity="0.25"/>
  <rect x="0" y="12" width="16" height="1" fill="#1e293b" opacity="0.25"/>
  <!-- Grid lines - vertical -->
  <rect x="0" y="0" width="1" height="16" fill="#1e293b" opacity="0.25"/>
  <rect x="4" y="0" width="1" height="16" fill="#1e293b" opacity="0.25"/>
  <rect x="8" y="0" width="1" height="16" fill="#1e293b" opacity="0.25"/>
  <rect x="12" y="0" width="1" height="16" fill="#1e293b" opacity="0.25"/>
  <!-- Decorative dots every 8 pixels -->
  <rect x="4" y="4" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="12" y="4" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="4" y="12" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="12" y="12" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <!-- Corner accents -->
  <rect x="0" y="0" width="1" height="1" fill="#1e293b" opacity="0.4"/>
  <rect x="8" y="0" width="1" height="1" fill="#1e293b" opacity="0.4"/>
  <rect x="0" y="8" width="1" height="1" fill="#1e293b" opacity="0.4"/>
  <rect x="8" y="8" width="1" height="1" fill="#1e293b" opacity="0.4"/>
</svg>
