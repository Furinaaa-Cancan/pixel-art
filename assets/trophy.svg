<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Trophy cup top rim -->
  <rect x="3" y="1" width="10" height="1" fill="#fbbf24"/>
  <!-- Cup body -->
  <rect x="3" y="2" width="10" height="1" fill="#fbbf24"/>
  <rect x="3" y="3" width="10" height="1" fill="#fbbf24"/>
  <rect x="3" y="4" width="10" height="1" fill="#f59e0b"/>
  <rect x="4" y="5" width="8" height="1" fill="#f59e0b"/>
  <rect x="4" y="6" width="8" height="1" fill="#f59e0b"/>
  <rect x="5" y="7" width="6" height="1" fill="#d97706"/>
  <rect x="5" y="8" width="6" height="1" fill="#d97706"/>
  <rect x="6" y="9" width="4" height="1" fill="#d97706"/>
  <!-- Handles -->
  <rect x="1" y="2" width="2" height="1" fill="#fbbf24"/>
  <rect x="1" y="3" width="1" height="1" fill="#f59e0b"/>
  <rect x="1" y="4" width="1" height="1" fill="#f59e0b"/>
  <rect x="1" y="5" width="2" height="1" fill="#d97706"/>
  <rect x="13" y="2" width="2" height="1" fill="#fbbf24"/>
  <rect x="14" y="3" width="1" height="1" fill="#f59e0b"/>
  <rect x="14" y="4" width="1" height="1" fill="#f59e0b"/>
  <rect x="13" y="5" width="2" height="1" fill="#d97706"/>
  <!-- Stem -->
  <rect x="7" y="10" width="2" height="1" fill="#d97706"/>
  <rect x="7" y="11" width="2" height="1" fill="#b45309"/>
  <!-- Base -->
  <rect x="5" y="12" width="6" height="1" fill="#f59e0b"/>
  <rect x="4" y="13" width="8" height="1" fill="#fbbf24"/>
  <rect x="4" y="14" width="8" height="1" fill="#d97706"/>
  <!-- Highlight on cup -->
  <rect x="4" y="2" width="1" height="1" fill="#fde68a"/>
  <rect x="4" y="3" width="1" height="1" fill="#fde68a"/>
  <!-- Star decoration on cup -->
  <rect x="7" y="4" width="2" height="1" fill="#fde68a"/>
  <rect x="7" y="5" width="2" height="1" fill="#fde68a"/>
</svg>
