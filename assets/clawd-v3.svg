<!--
  Clawd v3: 圆润型 (Rounded)
  身体上窄下宽, 32x32 画布
  设计思路：模拟参考图中略微圆润的上部轮廓
  顶部18px宽，底部20px宽，通过阶梯状像素实现梯形效果
  眼睛用1x2竖条，更像素风
  身体总高12px，比其他版本更高
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- 身体 主体 #D97757: 上窄下宽梯形 -->
  <!-- 顶部2行: 18px宽 x7-24, y7-8 -->
  <!-- 中部2行: 19px宽 x7-25, y9-10 (右侧多1px) -->
  <!-- 中下2行: 19px宽 x6-25, y11-12 (左侧多1px) -->
  <!-- 底部6行: 20px宽 x6-25, y13-18 -->
  <path d="M7 7h18v2H7z M7 9h19v2H7z M6 11h20v2H6z M6 13h20v6H6z" fill="#D97757"/>
  <!-- 高光 #E8956F: 顶部边缘一条线，模拟圆润光泽 -->
  <path d="M8 7h16v1H8z" fill="#E8956F"/>
  <!-- 眼睛 #2A2A2A: 1x2 竖条 at (11,10) 和 (21,10) -->
  <path d="M11 10h1v2h-1z M21 10h1v2h-1z" fill="#2A2A2A"/>
  <!-- 4条腿 #C46A4A: 各3px宽 x 4px高 -->
  <path d="M8 18h3v4H8z M13 18h3v4h-3z M17 18h3v4h-3z M22 18h3v4h-3z" fill="#C46A4A"/>
</svg>
