<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Base fill -->
  <rect x="0" y="0" width="16" height="16" fill="#0f172a"/>
  <!-- Grid lines - horizontal -->
  <rect x="0" y="0" width="16" height="1" fill="#1e293b" opacity="0.3"/>
  <rect x="0" y="4" width="16" height="1" fill="#1e293b" opacity="0.3"/>
  <rect x="0" y="8" width="16" height="1" fill="#1e293b" opacity="0.3"/>
  <rect x="0" y="12" width="16" height="1" fill="#1e293b" opacity="0.3"/>
  <!-- Grid lines - vertical -->
  <rect x="0" y="0" width="1" height="16" fill="#1e293b" opacity="0.3"/>
  <rect x="4" y="0" width="1" height="16" fill="#1e293b" opacity="0.3"/>
  <rect x="8" y="0" width="1" height="16" fill="#1e293b" opacity="0.3"/>
  <rect x="12" y="0" width="1" height="16" fill="#1e293b" opacity="0.3"/>
  <!-- Decorative crosses every 8 pixels -->
  <!-- Cross at (4,4) -->
  <rect x="4" y="3" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="3" y="4" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="4" y="4" width="1" height="1" fill="#1e293b" opacity="0.7"/>
  <rect x="5" y="4" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="4" y="5" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <!-- Cross at (12,4) -->
  <rect x="12" y="3" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="11" y="4" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="12" y="4" width="1" height="1" fill="#1e293b" opacity="0.7"/>
  <rect x="13" y="4" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="12" y="5" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <!-- Cross at (4,12) -->
  <rect x="4" y="11" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="3" y="12" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="4" y="12" width="1" height="1" fill="#1e293b" opacity="0.7"/>
  <rect x="5" y="12" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="4" y="13" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <!-- Cross at (12,12) -->
  <rect x="12" y="11" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="11" y="12" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="12" y="12" width="1" height="1" fill="#1e293b" opacity="0.7"/>
  <rect x="13" y="12" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <rect x="12" y="13" width="1" height="1" fill="#1e293b" opacity="0.5"/>
  <!-- Corner dots -->
  <rect x="0" y="0" width="1" height="1" fill="#1e293b" opacity="0.6"/>
  <rect x="8" y="0" width="1" height="1" fill="#1e293b" opacity="0.6"/>
  <rect x="0" y="8" width="1" height="1" fill="#1e293b" opacity="0.6"/>
  <rect x="8" y="8" width="1" height="1" fill="#1e293b" opacity="0.6"/>
</svg>
