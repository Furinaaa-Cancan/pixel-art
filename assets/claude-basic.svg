<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- Clawd 像素吉祥物 基础站立 32x32 -->
<!-- 临摹官方像素画：极简纯色方块，不加多余装饰 -->
<!-- 只用3色：主体#D97757 腿#C46A4A 眼睛#2A2A2A -->

<!-- 身体：纯色大方块 (22x12) -->
<path fill="#D97757" d="M5 5h22v12H5z"/>

<!-- 眼睛：2个小黑块 1x2，贴近顶部，偏外侧 -->
<path fill="#2A2A2A" d="
  M9 8h1v2H9z
  M22 8h1v2h-1z
"/>

<!-- 嘴：极小横线 -->
<path fill="#C46A4A" d="M14 14h4v1h-4z"/>

<!-- 4条腿：各3px宽 5px高，均匀分布 -->
<path fill="#C46A4A" d="
  M6 17h3v5H6z
  M12 17h3v5h-3z
  M17 17h3v5h-3z
  M23 17h3v5h-3z
"/>

</svg>
