<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Clawd 像素画迭代预览</title>
<style>
  body { background: #111; color: #eee; font-family: system-ui; margin: 0; padding: 24px; }
  h1 { font-weight: 300; font-size: 20px; margin-bottom: 24px; color: #D97757; }
  .grid { display: flex; flex-wrap: wrap; gap: 20px; }
  .card {
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 16px; text-align: center; width: 280px;
  }
  .card h3 { font-size: 13px; font-weight: 400; color: #888; margin: 0 0 12px 0; }
  .sizes { display: flex; align-items: flex-end; justify-content: center; gap: 12px; }
  img { image-rendering: pixelated; image-rendering: crisp-edges; }
  .label { font-size: 10px; color: #555; margin-top: 4px; }
</style>
</head>
<body>
<h1>Clawd 像素画 — 迭代预览</h1>
<div class="grid">
  <div class="card">
    <h3>clawd-pro · 16x16 轮廓+光影</h3>
    <div class="sizes">
      <div><img src="assets/clawd-pro.svg" width="48"><div class="label">3x</div></div>
      <div><img src="assets/clawd-pro.svg" width="128"><div class="label">8x</div></div>
      <div><img src="assets/clawd-pro.svg" width="256"><div class="label">16x</div></div>
    </div>
  </div>
  <div class="card">
    <h3>clawd-v3-clean · 16x16 纯色块</h3>
    <div class="sizes">
      <div><img src="assets/clawd-v3-clean.svg" width="48"><div class="label">3x</div></div>
      <div><img src="assets/clawd-v3-clean.svg" width="128"><div class="label">8x</div></div>
      <div><img src="assets/clawd-v3-clean.svg" width="256"><div class="label">16x</div></div>
    </div>
  </div>
  <div class="card">
    <h3>clawd-hd · 32x32 高精版</h3>
    <div class="sizes">
      <div><img src="assets/clawd-hd.svg" width="48"><div class="label">1.5x</div></div>
      <div><img src="assets/clawd-hd.svg" width="128"><div class="label">4x</div></div>
      <div><img src="assets/clawd-hd.svg" width="256"><div class="label">8x</div></div>
    </div>
  </div>
  <div class="card">
    <h3>claude-basic · 32x32 旧版</h3>
    <div class="sizes">
      <div><img src="assets/claude-basic.svg" width="48"><div class="label">1.5x</div></div>
      <div><img src="assets/claude-basic.svg" width="128"><div class="label">4x</div></div>
      <div><img src="assets/claude-basic.svg" width="256"><div class="label">8x</div></div>
    </div>
  </div>
</div>
</body>
</html>
