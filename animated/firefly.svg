<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- 萤火虫动画：虫体发光脉冲 + 光点闪烁 -->
<style>
.glow{animation:pulse 1.8s ease-in-out infinite alternate}
.stars{animation:twink 3s ease-in-out infinite}
.bug-glow{animation:bg 1.2s ease-in-out infinite alternate}
@keyframes pulse{0%{fill:#ffcd75}100%{fill:#a7f070}}
@keyframes twink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes bg{0%{fill:#a7f070;opacity:1}100%{fill:#ffcd75;opacity:0.6}}
</style>
