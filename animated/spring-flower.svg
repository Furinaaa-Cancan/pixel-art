<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
<!-- 春花动画：微风摇曳 -->
<style>
.bloom{animation:sway 3s ease-in-out infinite}
.leaf1{animation:lf1 2.5s ease-in-out infinite}
.leaf2{animation:lf2 2.8s ease-in-out 0.5s infinite}
@keyframes sway{0%,100%{transform:rotate(0deg);transform-origin:8px 11px}50%{transform:rotate(3deg);transform-origin:8px 11px}}
@keyframes lf1{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes lf2{0%,100%{opacity:0.5}50%{opacity:1}}
</style>
<g class="bloom">
<path fill="#1a1c2c" d="M7 0h2v1h-2zM5 1h2v1h-2zM9 1h2v1h-2zM4 2h1v1h-1zM11 2h1v1h-1zM4 3h1v1h-1zM11 3h1v1h-1zM5 4h2v1h-2zM9 4h2v1h-2zM7 5h2v1h-2z"/>
<path fill="#b13e53" d="M7 1h2v1h-2zM5 2h2v1h-2zM9 2h2v1h-2zM5 3h2v1h-2zM9 3h2v1h-2zM7 4h2v1h-2z"/>
<path fill="#ef7d57" d="M7 2h2v1h-2zM7 3h2v1h-2z"/>
<path fill="#ffcd75" d="M8 2h1v1h-1z">
<animate attributeName="fill" values="#ffcd75;#f4f4f4;#ffcd75" dur="2s" repeatCount="indefinite"/>
</path>
</g>
<!-- 茎（不跟随摇摆，保持固定） -->
<path fill="#38b764" d="M8 6h1v1h-1zM8 7h1v1h-1zM8 8h1v1h-1zM8 9h1v1h-1zM7 10h2v1h-2z"/>
<path fill="#1a1c2c" d="M7 6h1v1h-1zM9 6h1v1h-1zM7 7h1v1h-1zM9 7h1v1h-1zM7 8h1v1h-1zM9 8h1v1h-1zM7 9h1v1h-1zM9 9h1v1h-1zM6 10h1v1h-1zM9 10h1v1h-1zM5 11h5v1h-5z"/>
<path class="leaf1" fill="#a7f070" d="M10 6h1v1h-1z"/>
<path class="leaf2" fill="#a7f070" d="M5 9h1v1h-1z"/>
<path fill="#4a5e3b" d="M9 7h1v1h-1zM6 9h1v1h-1z"/>
</svg>