<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
<!-- 奶牛动画：嚼草 + 耳朵抖 -->
<style>
.ear{animation:twitch 4s ease-in-out infinite}
.chew{animation:munch 2s step-end infinite}
