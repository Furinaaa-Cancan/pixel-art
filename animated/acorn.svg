<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
<!-- 橡果动画：轻轻摇晃像刚从树上落下 -->
<style>
.nut{animation:wobble 2s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(0deg);transform-origin:7.5px 6px}25%{transform:rotate(3deg)}75%{transform:rotate(-3deg)}}
</style>
<g class="nut">
<path fill="#1a1c2c" d="M7 1h2v1h-2zM6 2h1v1h-1zM9 2h1v1h-1zM5 3h1v1h-1zM10 3h1v1h-1zM4 4h1v1h-1zM11 4h1v1h-1zM4 5h1v1h-1zM11 5h1v1h-1zM5 6h1v1h-1zM10 6h1v1h-1zM5 7h1v1h-1zM10 7h1v1h-1zM5 8h1v1h-1zM10 8h1v1h-1zM6 9h1v1h-1zM9 9h1v1h-1zM7 10h2v1h-2z"/>
<path fill="#a8775e" d="M7 2h2v1h-2zM6 3h4v1h-4zM5 4h6v1h-6zM5 5h6v1h-6z"/>
<path fill="#d4a56a" d="M7 2h1v1h-1zM6 3h2v1h-2zM5 4h2v1h-2z"/>
<path fill="#6b3e2e" d="M6 6h4v1h-4zM6 7h4v1h-4zM6 8h4v1h-4zM7 9h2v1h-2z"/>
<path fill="#a8775e" d="M6 6h1v1h-1zM6 7h1v1h-1z"/>
<path fill="#f4f4f4" d="M6 4h1v1h-1z">
<animate attributeName="fill" values="#f4f4f4;#ffcd75;#f4f4f4" dur="3s" repeatCount="indefinite"/>
</path>
<path fill="#38b764" d="M8 1h1v1h-1z"/>
</g>
</svg>