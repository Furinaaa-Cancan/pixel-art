<path fill="#1a1c2c" d="M6 5h1v1h-1zM11 5h1v1h-1zM4 6h3v1h-3zM9 6h3v1h-3zM4 7h3v1h-3zM9 7h3v1h-3zM7 9h2v1h-2zM7 10h2v1h-2z"/>
<path fill="#b13e53" d="M4 9h2v1h-2zM10 9h2v1h-2z"/>
</g>
</svg>