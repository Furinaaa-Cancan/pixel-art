<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- 猫咪眨眼动画：每4秒眨一次眼 -->
<style>
.blink-w{animation:bw 4s step-end infinite}
.blink-b{animation:bb 4s step-end infinite}
@keyframes bw{0%,92%{fill:#f4f4f4}94%{fill:#ef7d57}96%{fill:#f4f4f4}}
@keyframes bb{0%,92%{fill:#1a1c2c}94%{fill:#ef7d57}96%{fill:#1a1c2c}}
</style>
<!-- 耳朵内侧（粉红） -->
<path fill="#b13e53" d="M8 4h1v1h-1zM22 4h1v1h-1zM8 5h1v1h-1zM22 5h1v1h-1zM8 13h2v1h-2zM15 13h2v1h-2zM23 13h2v1h-2zM8 14h2v1h-2zM23 14h2v1h-2z"/>
<!-- 身体（橙色） -->
<path fill="#ef7d57" d="M8 3h2v1h-2zM21 3h2v1h-2zM7 4h1v1h-1zM9 4h2v1h-2zM20 4h2v1h-2zM23 4h1v1h-1zM7 5h1v1h-1zM9 5h2v1h-2zM20 5h2v1h-2zM23 5h1v1h-1zM9 6h14v1h-14zM8 7h16v1h-16zM7 8h18v1h-18zM7 9h18v1h-18zM7 10h3v1h-3zM13 10h6v1h-6zM22 10h3v1h-3zM7 11h3v1h-3zM13 11h6v1h-6zM22 11h3v1h-3zM7 12h3v1h-3zM13 12h6v1h-6zM22 12h3v1h-3zM7 13h1v1h-1zM10 13h5v1h-5zM17 13h6v1h-6zM7 14h1v1h-1zM10 14h4v1h-4zM15 14h1v1h-1zM17 14h1v1h-1zM19 14h4v1h-4zM8 15h7v1h-7zM16 15h1v1h-1zM18 15h6v1h-6zM9 16h14v1h-14zM10 17h12v1h-12zM11 18h10v1h-10zM11 19h3v1h-3zM18 19h3v1h-3zM22 19h2v1h-2zM12 20h2v1h-2zM18 20h2v1h-2zM21 20h1v1h-1zM24 20h1v1h-1zM12 21h2v1h-2zM18 21h3v1h-3zM24 21h1v1h-1zM12 22h8v1h-8zM23 22h1v1h-1zM12 23h3v1h-3zM17 23h3v1h-3zM12 24h3v1h-3zM17 24h3v1h-3z"/>
<!-- 眼白（眨眼时变橙色） -->
<path class="blink-w" fill="#f4f4f4" d="M10 10h2v1h-2zM19 10h2v1h-2z"/>
<!-- 眼黑+瞳孔（眨眼时变橙色） -->
<path class="blink-b" fill="#1a1c2c" d="M12 10h1v1h-1zM21 10h1v1h-1zM10 11h3v1h-3zM19 11h3v1h-3zM10 12h3v1h-3zM19 12h3v1h-3z"/>
<!-- 鼻子+嘴巴（不参与眨眼） -->
<path fill="#1a1c2c" d="M14 14h1v1h-1zM16 14h1v1h-1zM18 14h1v1h-1zM15 15h1v1h-1zM17 15h1v1h-1z"/>
<!-- 胡须 -->
<path fill="#333c57" d="M5 12h2v1h-2zM26 12h2v1h-2zM5 14h2v1h-2zM26 14h2v1h-2z"/>
<!-- 下巴/肚皮 -->
<path fill="#ffcd75" d="M14 19h4v1h-4zM14 20h4v1h-4zM14 21h4v1h-4zM12 25h3v1h-3zM17 25h3v1h-3z"/>
</svg>