<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- 火焰闪烁动画：三层颜色异步跳变 + 火焰微微上浮 -->
<style>
.fire{animation:sway 1.5s ease-in-out infinite}
@keyframes sway{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
</style>
<g class="fire">
<path fill="#ffcd75" d="M17 2h1v1h-1zM8 5h3v1h-3zM12 5h13v1h-13zM7 6h17v1h-17zM6 7h21v1h-21zM5 8h21v1h-21zM9 9h16v1h-16zM14 10h6v1h-6zM13 11h7v1h-7zM13 12h6v1h-6zM13 13h6v1h-6zM13 14h5v1h-5zM14 15h4v1h-4zM15 16h2v1h-2zM15 17h2v1h-2zM15 18h2v1h-2zM14 19h4v1h-4z">
<animate attributeName="fill" values="#ffcd75;#ef7d57;#ffcd75;#ffcd75;#ef7d57;#ffcd75" dur="0.5s" repeatCount="indefinite" calcMode="discrete"/>
</path>
<path fill="#ef7d57" d="M14 3h1v1h-1zM19 4h1v1h-1zM11 10h3v1h-3zM20 10h4v1h-4zM10 11h3v1h-3zM20 11h3v1h-3zM9 12h4v1h-4zM19 12h3v1h-3zM8 13h5v1h-5zM19 13h3v1h-3zM8 14h5v1h-5zM18 14h4v1h-4zM8 15h6v1h-6zM18 15h5v1h-5zM13 16h2v1h-2zM17 16h2v1h-2zM14 17h1v1h-1zM17 17h2v1h-2zM13 18h2v1h-2zM17 18h2v1h-2zM13 19h1v1h-1zM18 19h1v1h-1z">
<animate attributeName="fill" values="#ef7d57;#ef7d57;#b13e53;#ef7d57;#b13e53;#ef7d57;#ef7d57" dur="0.7s" repeatCount="indefinite" calcMode="discrete"/>
</path>
<path fill="#b13e53" d="M11 5h1v1h-1zM9 16h4v1h-4zM19 16h5v1h-5zM11 17h3v1h-3zM19 17h5v1h-5zM11 18h2v1h-2zM19 18h4v1h-4zM11 19h2v1h-2zM19 19h2v1h-2zM15 29h2v1h-2z">
<animate attributeName="fill" values="#b13e53;#b13e53;#b13e53;#5d275d;#b13e53" dur="1.1s" repeatCount="indefinite" calcMode="discrete"/>
</path>
</g>
<!-- 底座（木柴+阴影）保持静止 -->
<path fill="#f4f4f4" d="M10 20h12v1h-12zM11 21h10v1h-10zM11 22h10v1h-10zM12 23h8v1h-8zM13 24h6v1h-6zM13 25h6v1h-6zM14 26h4v1h-4zM14 27h4v1h-4zM14 28h4v1h-4z"/>
<path fill="#5d275d" d="M19 25h1v1h-1zM18 26h2v1h-2zM18 27h2v1h-2zM18 28h1v1h-1z"/>
</svg>