<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
<!-- 浇水壶动画：水滴落下 -->
<style>
.d1{animation:drop1 1.5s ease-in infinite}
.d2{animation:drop2 1.5s ease-in 0.5s infinite}
.d3{animation:drop3 1.5s ease-in 1s infinite}
@keyframes drop1{0%{transform:translateY(0);opacity:1}100%{transform:translateY(4px);opacity:0}}
@keyframes drop2{0%{transform:translateY(0);opacity:1}100%{transform:translateY(3px);opacity:0}}
@keyframes drop3{0%{transform:translateY(0);opacity:1}100%{transform:translateY(4px);opacity:0}}
</style>
