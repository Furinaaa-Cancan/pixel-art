<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
<!-- 星星闪烁动画：旋转光芒 + 颜色脉动 -->
<style>
.shine{animation:glow 1.5s ease-in-out infinite alternate}
.flash{animation:fl 2s ease-in-out infinite}
@keyframes glow{0%{fill:#ffcd75}100%{fill:#f4f4f4}}
@keyframes fl{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
<path class="shine" fill="#ffcd75" d="M7 0h2v1h-2zM7 1h2v1h-2zM6 2h4v1h-4zM5 3h1v1h-1zM7 3h4v1h-4zM4 4h1v1h-1zM6 4h6v1h-6zM0 5h4v1h-4zM5 5h11v1h-11zM1 6h14v1h-14zM3 7h3v1h-3zM7 7h2v1h-2zM10 7h3v1h-3zM3 8h1v1h-1zM6 8h4v1h-4zM12 8h1v1h-1zM4 9h1v1h-1zM11 9h1v1h-1zM3 10h10v1h-10zM2 11h3v1h-3zM8 11h2v1h-2zM11 11h3v1h-3zM1 12h3v1h-3zM12 12h3v1h-3zM1 13h2v1h-2zM13 13h2v1h-2z"/>
<path class="flash" fill="#f4f4f4" d="M6 3h1v1h-1zM5 4h1v1h-1zM4 5h1v1h-1z"/>
<path fill="#1a1c2c" d="M6 7h1v1h-1zM9 7h1v1h-1zM5 8h1v1h-1zM10 8h1v1h-1zM6 9h4v1h-4z"/>
<path fill="#ef7d57" d="M4 8h1v1h-1zM11 8h1v1h-1zM5 9h1v1h-1zM10 9h1v1h-1z">
<animate attributeName="fill" values="#ef7d57;#ffcd75;#ef7d57" dur="1.5s" repeatCount="indefinite"/>
</path>
</svg>