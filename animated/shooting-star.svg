<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- 流星动画：星体闪烁 + 尾迹脉动 -->
<style>
.star{animation:twinkle 0.8s ease-in-out infinite alternate}
.tail-o{animation:trail-o 1.2s ease-in-out infinite}
.tail-r{animation:trail-r 1.2s ease-in-out 0.2s infinite}
@keyframes twinkle{0%{fill:#ffcd75}100%{fill:#f4f4f4}}
@keyframes trail-o{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes trail-r{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
<!-- 夜空背景 -->
<path fill="#29366f" d="M0,0h32v1h-32ZM0,1h18v1h-18ZM19,1h13v1h-13ZM0,2h7v1h-7ZM8,2h24v1h-24ZM0,3h25v1h-25ZM27,3h5v1h-5ZM0,4h23v1h-23ZM27,4h5v1h-5ZM0,5h2v1h-2ZM3,5h19v1h-19ZM27,5h4v1h-4ZM0,6h22v1h-22ZM27,6h5v1h-5ZM0,7h22v1h-22ZM28,7h4v1h-4ZM0,8h22v1h-22ZM26,8h6v1h-6ZM0,9h21v1h-21ZM22,9h10v1h-10ZM0,10h20v1h-20ZM21,10h9v1h-9ZM31,10h1v1h-1ZM0,11h19v1h-19ZM21,11h11v1h-11ZM0,12h18v1h-18ZM20,12h12v1h-12ZM0,13h17v1h-17ZM19,13h13v1h-13ZM0,14h15v1h-15ZM18,14h14v1h-14ZM1,15h13v1h-13ZM17,15h15v1h-15ZM0,16h13v1h-13ZM16,16h16v1h-16ZM0,17h12v1h-12ZM15,17h17v1h-17ZM0,18h11v1h-11ZM14,18h18v1h-18ZM0,19h10v1h-10ZM13,19h19v1h-19ZM0,20h9v1h-9ZM12,20h16v1h-16ZM29,20h3v1h-3ZM0,21h8v1h-8ZM11,21h21v1h-21ZM0,22h3v1h-3ZM4,22h3v1h-3ZM10,22h22v1h-22ZM0,23h8v1h-8ZM9,23h23v1h-23ZM0,24h32v1h-32ZM0,25h22v1h-22ZM23,25h9v1h-9ZM0,26h32v1h-32ZM0,27h32v1h-32ZM0,28h12v1h-12ZM13,28h12v1h-12ZM26,28h6v1h-6ZM0,29h32v1h-32ZM0,30h5v1h-5ZM6,30h8v1h-8ZM15,30h17v1h-17ZM0,31h32v1h-32Z"/>
<!-- 星星（闪烁点） -->
<path fill="#f4f4f4" d="M18,1h1v1h-1ZM7,2h1v1h-1ZM25,3h2v1h-2ZM26,4h1v1h-1ZM2,5h1v1h-1ZM22,5h1v1h-1ZM31,5h1v1h-1ZM22,6h1v1h-1ZM26,6h1v1h-1ZM26,7h1v1h-1ZM30,10h1v1h-1ZM0,15h1v1h-1ZM28,20h1v1h-1ZM3,22h1v1h-1ZM22,25h1v1h-1ZM12,28h1v1h-1ZM25,28h1v1h-1ZM5,30h1v1h-1ZM14,30h1v1h-1Z">
<animate attributeName="opacity" values="1;0.3;1;0.6;1" dur="2s" repeatCount="indefinite"/>
</path>
<!-- 流星头部（金黄闪烁） -->
<path class="star" fill="#ffcd75" d="M23,4h1v1h-1ZM25,4h1v1h-1ZM23,5h4v1h-4ZM23,6h3v1h-3ZM22,7h4v1h-4ZM27,7h1v1h-1ZM22,8h1v1h-1ZM21,9h1v1h-1ZM20,10h1v1h-1z"/>
<path fill="#ef7d57" d="M24,4h1v1h-1ZM23,8h3v1h-3z">
<animate attributeName="fill" values="#ef7d57;#ffcd75;#ef7d57" dur="0.6s" repeatCount="indefinite"/>
</path>
<!-- 尾迹（橙色脉动） -->
<path class="tail-o" fill="#ef7d57" d="M19,11h2v1h-2ZM18,12h2v1h-2ZM17,13h2v1h-2ZM15,14h3v1h-3Z"/>
<!-- 尾迹（红色脉动） -->
