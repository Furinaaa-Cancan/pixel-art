<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
<!-- 药水冒泡动画：液体颜色脉动 + 高光闪烁 + 气泡浮动 -->
<style>
.bub1{animation:rise1 2s ease-in-out infinite}
.bub2{animation:rise2 2.5s ease-in-out 0.8s infinite}
.bub3{animation:rise3 1.8s ease-in-out 1.4s infinite}
.shimmer{animation:shim 3s ease-in-out infinite}
@keyframes rise1{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(-3px);opacity:0}}
@keyframes rise2{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(-4px);opacity:0}}
@keyframes rise3{0%,100%{transform:translateY(0);opacity:0}30%{opacity:1}70%{transform:translateY(-3px);opacity:0}}
@keyframes shim{0%,100%{fill:#73eff7}50%{fill:#41a6f6}}
</style>
<!-- 瓶盖 -->
<path fill="#ef7d57" d="M13 3h6v1h-6zM13 5h6v1h-6"/>
<path fill="#ffcd75" d="M13 4h1v1h-1zM16 4h3v1h-3"/>
<path fill="#f4f4f4" d="M14 4h2v1h-2z"/>
<!-- 瓶颈 -->
<path fill="#3b5dc9" d="M14 6h1v1h-1zM14 7h1v1h-1zM14 8h1v1h-1zM14 9h1v1h-1zM14 10h1v1h-1zM14 11h1v1h-1zM11 12h2v1h-2zM9 13h1v1h-1z"/>
<!-- 瓶身轮廓 -->
<path fill="#333c57" d="M13 6h1v1h-1zM18 6h1v1h-1zM13 7h1v1h-1zM18 7h1v1h-1zM13 8h1v1h-1zM18 8h1v1h-1zM13 9h1v1h-1zM18 9h1v1h-1zM13 10h1v1h-1zM18 10h1v1h-1zM11 11h2v1h-2zM19 11h2v1h-2zM9 12h2v1h-2zM21 12h2v1h-2zM8 13h1v1h-1zM23 13h1v1h-1zM8 14h1v1h-1zM22 14h2v1h-2zM8 15h1v1h-1zM22 15h2v1h-2zM8 16h1v1h-1zM22 16h2v1h-2zM8 17h1v1h-1zM22 17h2v1h-2zM8 18h1v1h-1zM22 18h2v1h-2zM8 19h1v1h-1zM22 19h2v1h-2zM8 20h1v1h-1zM22 20h2v1h-2zM8 21h1v1h-1zM22 21h2v1h-2zM8 22h1v1h-1zM22 22h2v1h-2zM8 23h1v1h-1zM22 23h2v1h-2zM8 24h1v1h-1zM22 24h2v1h-2zM8 25h1v1h-1zM22 25h2v1h-2zM8 26h16v1h-16z"/>
<!-- 瓶身深蓝 -->
<path fill="#29366f" d="M15 6h3v1h-3zM15 7h3v1h-3zM15 8h3v1h-3zM15 9h3v1h-3zM15 10h3v1h-3zM13 11h1v1h-1zM15 11h4v1h-4zM13 12h8v1h-8zM10 13h13v1h-13zM11 14h11v1h-11z"/>
<!-- 玻璃反光 -->
<path fill="#94b0c2" d="M10 14h1v1h-1zM10 15h1v1h-1zM10 16h1v1h-1zM10 17h1v1h-1zM10 18h1v1h-1zM10 19h1v1h-1zM10 20h1v1h-1zM10 21h1v1h-1zM10 22h1v1h-1zM10 23h1v1h-1zM10 24h1v1h-1zM10 25h1v1h-1z"/>
<!-- 药水液体（紫色） -->
<path fill="#c77dff" d="M11 15h11v1h-11zM11 16h11v1h-11zM11 17h11v1h-11zM11 18h7v1h-7zM19 18h3v1h-3z">
<animate attributeName="fill" values="#c77dff;#a855f7;#c77dff" dur="2s" repeatCount="indefinite"/>
</path>
<!-- 药水液体（深紫） -->
<path fill="#5d275d" d="M11 19h11v1h-11zM11 20h4v1h-4zM16 20h6v1h-6zM11 21h9v1h-9zM21 21h1v1h-1z">
<animate attributeName="fill" values="#5d275d;#7c3aed;#5d275d" dur="2.5s" repeatCount="indefinite"/>
</path>
<!-- 药水液体（最深） -->
<path fill="#3d1a50" d="M11 22h2v1h-2zM14 22h8v1h-8zM11 23h6v1h-6zM18 23h4v1h-4zM11 24h11v1h-11zM11 25h11v1h-11z"/>
<!-- 高光气泡 -->
<circle class="bub1" cx="15.5" cy="20.5" r="0.5" fill="#73eff7"/>
<circle class="bub2" cx="18.5" cy="22.5" r="0.5" fill="#73eff7"/>
<circle class="bub3" cx="13.5" cy="23.5" r="0.5" fill="#73eff7"/>
<!-- 原有高光 -->
<path fill="#73eff7" d="M18 18h1v1h-1z">
<animate attributeName="fill" values="#73eff7;#41a6f6;#73eff7;#f4f4f4;#73eff7" dur="1.5s" repeatCount="indefinite"/>
</path>
<path fill="#73eff7" d="M20 21h1v1h-1z">
<animate attributeName="fill" values="#73eff7;#f4f4f4;#73eff7;#41a6f6;#73eff7" dur="1.8s" repeatCount="indefinite"/>
</path>
<!-- 瓶身白色高光 -->
<path fill="#f4f4f4" d="M9 14h1v1h-1zM9 15h1v1h-1zM9 16h1v1h-1zM9 17h1v1h-1zM9 18h1v1h-1zM9 19h1v1h-1zM9 20h1v1h-1zM15 20h1v1h-1zM9 21h1v1h-1zM9 22h1v1h-1zM13 22h1v1h-1zM9 23h1v1h-1zM17 23h1v1h-1zM9 24h1v1h-1zM9 25h1v1h-1z">
<animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
</path>
</svg>